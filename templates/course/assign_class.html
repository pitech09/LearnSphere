{% extends "base.html" %}
{% load i18n %}

{% block content %}

<div class="container mt-4">

    <h3>
        Assign Class to {{ student.user.username }}
    </h3>

    <p>
        Current Class:
        <strong>
            {{ student.student_class|default:"Not Assigned" }}
        </strong>
    </p>

    <form method="POST">
        {% csrf_token %}

        <div class="card p-3">
            {{ form.student_class.label_tag }}
            {{ form.student_class }}
        </div>

        <br>

        <button type="submit" class="btn btn-primary">
            Save Class
        </button>

        <a href="{% url 'student_list' %}" class="btn btn-secondary">
            Cancel
        </a>
    </form>

</div>

{% endblock %}
